version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: shop-app
    restart: always
    environment:
      - DATABASE_URL=postgresql://shop:shoppassword@db:5432/shop
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - TOSS_CLIENT_KEY=${TOSS_CLIENT_KEY}
      - TOSS_SECRET_KEY=${TOSS_SECRET_KEY}
      - BASE_URL=${BASE_URL}
      - DEBUG=false
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db
      - redis
    networks:
      - shop-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:15
    container_name: shop-db
    restart: always
    environment:
      - POSTGRES_USER=shop
      - POSTGRES_PASSWORD=shoppassword
      - POSTGRES_DB=shop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shop-network

  redis:
    image: redis:7-alpine
    container_name: shop-redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - shop-network

  nginx:
    image: nginx:alpine
    container_name: shop-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - uploads:/app/uploads:ro
    depends_on:
      - app
    networks:
      - shop-network

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 86400  # 하루마다 이미지 업데이트 확인

volumes:
  postgres_data:
  redis_data:
  uploads:

networks:
  shop-network:
    driver: bridge
