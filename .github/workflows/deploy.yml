name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check deploy secrets
        id: check-secrets
        env:
          HOST: ${{ secrets.HOST }}
        run: |
          if [ -z "$HOST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ 배포 시크릿(HOST, USERNAME, SSH_KEY)이 설정되지 않아 배포를 건너뜁니다."
            echo "실제 배포 시 저장소 Settings > Secrets and variables > Actions에 다음 값을 설정하세요."
            echo "  - HOST: 서버 IP 또는 도메인"
            echo "  - USERNAME: SSH 사용자명"
            echo "  - SSH_KEY: SSH 개인키"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to server
        if: steps.check-secrets.outputs.skip == 'false'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /app/shop
            git pull
            docker-compose -f docker-compose.prod.yml up -d --build
            docker-compose -f docker-compose.prod.yml run --rm app alembic upgrade head
            echo "배포 완료"
