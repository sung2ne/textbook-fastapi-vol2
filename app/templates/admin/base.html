<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}관리자{% endblock %} - 쇼핑몰 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100vh;
            background: #212529;
            padding-top: 20px;
            overflow-y: auto;
        }
        .sidebar a {
            color: rgba(255,255,255,.8);
            padding: 10px 20px;
            display: block;
            text-decoration: none;
        }
        .sidebar a:hover, .sidebar a.active {
            color: #fff;
            background: rgba(255,255,255,.1);
        }
        .main-content {
            margin-left: 250px;
            padding: 20px;
            min-height: 100vh;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <!-- 사이드바 -->
    <div class="sidebar">
        <h5 class="text-white px-3 mb-4">쇼핑몰 관리</h5>
        <nav>
            <a href="/admin" class="{% if request.url.path == '/admin' %}active{% endif %}">
                <i class="bi bi-speedometer2 me-2"></i> 대시보드
            </a>
            <a href="/admin/orders" class="{% if '/admin/orders' in request.url.path %}active{% endif %}">
                <i class="bi bi-receipt me-2"></i> 주문 관리
            </a>
            <a href="/admin/products" class="{% if '/admin/products' in request.url.path %}active{% endif %}">
                <i class="bi bi-box me-2"></i> 상품 관리
            </a>
            <a href="/admin/categories" class="{% if '/admin/categories' in request.url.path %}active{% endif %}">
                <i class="bi bi-tags me-2"></i> 카테고리
            </a>
            <a href="/admin/users" class="{% if '/admin/users' in request.url.path %}active{% endif %}">
                <i class="bi bi-people me-2"></i> 회원 관리
            </a>
            <hr class="text-white-50 mx-3">
            <a href="/" target="_blank">
                <i class="bi bi-shop me-2"></i> 쇼핑몰 보기
            </a>
            <div class="px-3 mt-3">
                <form method="post" action="/logout">
                    <button type="submit" class="btn btn-outline-light btn-sm w-100">로그아웃</button>
                </form>
            </div>
        </nav>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
