{% extends "base.html" %}

{% block title %}결제 실패{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="text-center">
        <div class="mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor"
                 class="bi bi-x-circle text-danger" viewBox="0 0 16 16">
                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
            </svg>
        </div>

        <h1 class="h2 mb-3">결제에 실패했습니다</h1>
        <p class="text-muted mb-2">{{ message }}</p>
        {% if code %}
        <p class="text-muted small mb-4">에러 코드: {{ code }}</p>
        {% endif %}

        <div class="d-flex justify-content-center gap-2">
            {% if order_id %}
            <a href="/payment/{{ order_id }}" class="btn btn-primary">다시 결제하기</a>
            {% endif %}
            <a href="/cart" class="btn btn-outline-secondary">장바구니로 돌아가기</a>
        </div>
    </div>
</div>
{% endblock %}
