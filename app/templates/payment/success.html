{% extends "base.html" %}

{% block title %}결제 완료{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="text-center">
        <div class="mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor"
                 class="bi bi-check-circle text-success" viewBox="0 0 16 16">
                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                <path d="M10.97 4.97a.235.235 0 0 0-.02.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05z"/>
            </svg>
        </div>

        <h1 class="h2 mb-3">결제가 완료되었습니다</h1>
        <p class="text-muted mb-4">주문이 정상적으로 접수되었습니다.</p>

        <div class="card mx-auto mb-4" style="max-width: 400px;">
            <div class="card-body text-start">
                <div class="d-flex justify-content-between mb-2">
                    <span>주문번호</span>
                    <strong>{{ order.order_number }}</strong>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span>결제 금액</span>
                    <strong class="text-primary">{{ order.final_price|format_price }}</strong>
                </div>
                <div class="d-flex justify-content-between">
                    <span>결제 일시</span>
                    <span>{{ order.paid_at|format_datetime }}</span>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center gap-2">
            <a href="/orders/{{ order.order_number }}" class="btn btn-primary">주문 상세 보기</a>
            <a href="/products" class="btn btn-outline-primary">쇼핑 계속하기</a>
        </div>
    </div>
</div>
{% endblock %}
