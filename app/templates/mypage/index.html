{% extends "base.html" %}

{% block title %}마이페이지{% endblock %}

{% block content %}
<div class="container py-4">
    <h1 class="mb-4">마이페이지</h1>

    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card">
                <div class="card-header">회원 정보</div>
                <div class="card-body">
                    <p><strong>이름:</strong> {{ user.name }}</p>
                    <p><strong>이메일:</strong> {{ user.email }}</p>
                    <p><strong>연락처:</strong> {{ user.phone or '-' }}</p>
                    <p><strong>가입일:</strong> {{ user.created_at|format_datetime }}</p>
                    <a href="/mypage/edit" class="btn btn-outline-primary">정보 수정</a>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="list-group">
                <a href="/orders" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    주문 내역
                    <span class="badge bg-primary rounded-pill">→</span>
                </a>
                <a href="/mypage/password" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    비밀번호 변경
                    <span class="badge bg-primary rounded-pill">→</span>
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
