{% extends "base.html" %}

{% block content %}
<h1>상품 등록</h1>

<form method="post">
    <div class="mb-3">
        <label for="name" class="form-label">상품명</label>
        <input type="text"
               class="form-control {% if errors.name %}is-invalid{% endif %}"
               id="name"
               name="name"
               value="{{ form_data.name | default('') }}"
               required>
        {% if errors.name %}
        <div class="invalid-feedback">{{ errors.name }}</div>
        {% endif %}
    </div>

    <div class="mb-3">
        <label for="price" class="form-label">가격</label>
        <input type="number"
               class="form-control {% if errors.price %}is-invalid{% endif %}"
               id="price"
               name="price"
               value="{{ form_data.price | default('') }}"
               required>
        {% if errors.price %}
        <div class="invalid-feedback">{{ errors.price }}</div>
        {% endif %}
    </div>

    <div class="mb-3">
        <label for="description" class="form-label">설명</label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ form_data.description | default('') }}</textarea>
    </div>

    <button type="submit" class="btn btn-primary">등록</button>
    <a href="/products" class="btn btn-secondary">취소</a>
</form>
{% endblock %}
